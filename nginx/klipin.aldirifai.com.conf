# nginx site config untuk klipin.aldirifai.com
# Deploy:
#   sudo cp nginx/klipin.aldirifai.com.conf /etc/nginx/sites-available/klipin.aldirifai.com
#   sudo ln -s /etc/nginx/sites-available/klipin.aldirifai.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d klipin.aldirifai.com
#
# Certbot akan otomatis edit file ini buat tambah listen 443 + cert paths.

upstream klipin_api {
    server 127.0.0.1:9787;
    keepalive 32;
}

upstream klipin_web {
    server 127.0.0.1:9737;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name klipin.aldirifai.com;

    # Upload video sampai 1 GB (sesuai cap di backend, MAX_UPLOAD_BYTES).
    client_max_body_size 1024M;
    client_body_timeout 600s;
    proxy_request_buffering off;

    # Akses log per-site (gampang debug)
    access_log /var/log/nginx/klipin.access.log;
    error_log /var/log/nginx/klipin.error.log;

    # Backend routes — semua ke FastAPI di port 9787
    location ~ ^/(health|auth|jobs|clips|payments|docs|redoc|openapi\.json) {
        proxy_pass http://klipin_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout panjang buat job streaming + render long-running
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Streaming clip mp4 (FileResponse pakai chunked transfer)
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Frontend Next.js — semua sisa ke port 9737
    location / {
        proxy_pass http://klipin_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # Gzip kompres response (kecil-kecilan optimization)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
}
