# Klipin production stack
# Usage:
#   1. cp .env.example .env  (and fill in values)
#   2. docker compose up -d --build
#
# DESIGN: tidak pakai port 80/443. Web + API expose di port non-standar
# (default WEB_PORT=9737, API_PORT=9787) — tinggal route dari reverse proxy
# kamu yang udah ada (nginx/caddy/traefik di host) ke port-port itu.
# Untuk HTTPS, host reverse proxy yang handle TLS.
#
# Kalau VPS-nya kosong dan butuh auto-HTTPS, pakai overlay:
#   docker compose -f docker-compose.yml -f docker-compose.caddy.yml up -d --build

services:
  api:
    build:
      context: ./apps/api
    image: klipin-api:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      STORAGE_DIR: /app/storage
      DATABASE_URL: sqlite+aiosqlite:////app/data/klipin.db
    ports:
      - "${API_BIND:-127.0.0.1}:${API_PORT:-9787}:8000"
    volumes:
      - klipin_storage:/app/storage
      - klipin_data:/app/data
    networks:
      - klipin
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: klipin-web:latest
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-9737}:3000"
    networks:
      - klipin
    depends_on:
      - api

networks:
  klipin:
    driver: bridge

volumes:
  klipin_storage:
  klipin_data:
